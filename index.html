<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ostatni Grosz - LGC Crew</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="scene" id="scene"></div>

    <canvas id="cloud-canvas"></canvas>

    <div class="cloud cloud-1"></div>
    <div class="cloud cloud-2"></div>

    <div class="pranie pranie-1"></div>
    <div class="pranie pranie-2"></div>

    <div class="char" id="capy"></div>
    <div class="char" id="lgc-face"></div>

    <div class="kapibara-chat" id="kapibaraChat" style="display: none;">
        <div class="chat-header">
            <span>LGC Crew Chat</span>
            <span id="closeChat" style="cursor: pointer;">&times;</span>
        </div>
        <div class="chat-window" id="kapibaraChatWindow">
            <div class="msg bot">Siema mordo! Jesteśmy z kapibarą na posterunku. Pilnujemy Grosza. O co kminisz?</div>
        </div>
        <div class="chat-input-area">
            <input type="text" id="kapibaraInput" placeholder="Napisz coś do LGC...">
            <button id="kapibaraSend">Wyślij</button>
        </div>
        <div id="mouth"></div>
    </div>

    <div id="popup" class="popup" style="display: none;">
        <div class="popup-content">
            <span class="close-btn" onclick="window.closePopup()">&times;</span>
            <p id="story"></p>
        </div>
    </div>

    <div class="bottom-menu">
        <button id="btn-start">Start</button>
        <button id="btn-misje" class="highlight-btn">Misje</button>
        <button id="btn-mapa">Mapa</button>
        <button id="btn-postacie">Postacie</button>
        <button id="btn-kontakt">Kontakt</button>
    </div>

    <script src="agent.js"></script>
</body>
</html>
